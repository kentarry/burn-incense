<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>虔誠燒香 — 線上拜拜工具</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      font-size: 16px
    }

    body {
      font-family: 'Noto Serif TC', Georgia, serif;
      background: linear-gradient(180deg, #0D0D1A, #1A1A2E 40%, #16213E);
      color: #E8DCC8;
      min-height: 100vh;
      overflow-x: hidden
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-thumb {
      background: #DAA520;
      border-radius: 4px
    }

    button {
      font-family: 'Noto Serif TC', sans-serif;
      transition: all .18s ease;
      cursor: pointer;
      border: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden
    }

    button:hover {
      filter: brightness(1.15)
    }

    button:active {
      transform: scale(0.92);
      filter: brightness(1.2)
    }

    .sel-btn {
      padding: 16px 12px;
      border-radius: 12px;
      text-align: center;
      background: rgba(255, 255, 255, .03);
      border: 1px solid rgba(255, 255, 255, .1);
      transition: all .2s ease
    }

    .sel-btn:active {
      transform: scale(0.92);
      background: rgba(218, 165, 32, .15);
      box-shadow: 0 0 20px rgba(218, 165, 32, .3)
    }

    .sel-btn.active {
      background: rgba(218, 165, 32, .15);
      border: 2px solid #DAA520;
      box-shadow: 0 0 16px rgba(218, 165, 32, .25)
    }

    .sel-btn .label {
      font-size: 15px;
      color: #BBA86A;
      font-weight: 600
    }

    .sel-btn.active .label {
      color: #FFD700
    }

    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 0
    }

    .tab-btn {
      padding: 12px 20px;
      border: 1px solid rgba(218, 165, 32, .25);
      background: rgba(255, 255, 255, .03);
      color: #8B7D6B;
      font-size: 16px;
      font-weight: 600;
      transition: all .2s ease
    }

    .tab-btn:active {
      transform: scale(0.94);
      background: rgba(218, 165, 32, .12);
      box-shadow: 0 0 12px rgba(218, 165, 32, .2)
    }

    .tab-btn.active {
      background: rgba(218, 165, 32, .2);
      color: #FFD700;
      box-shadow: 0 0 12px rgba(218, 165, 32, .18)
    }

    .tab-btn:first-child {
      border-radius: 8px 0 0 8px
    }

    .tab-btn:last-child {
      border-radius: 0 8px 8px 0
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px
    }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px
    }

    .grid2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px
    }

    .flex-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .center {
      text-align: center
    }

    .container {
      max-width: 960px;
      width: 94%;
      margin: 0 auto;
      padding: 0 16px
    }

    .offering-table {
      background: linear-gradient(180deg, #C0392B, #96281B);
      border-radius: 4px 4px 0 0;
      padding: 12px 12px 8px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .3);
      border: 1px solid #7A1010;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      align-items: flex-end
    }

    .table-leg {
      width: 8px;
      height: 18px;
      background: #8B1A1A;
      border-radius: 0 0 3px 3px
    }

    .start-btn {
      width: 100%;
      margin-top: 14px;
      padding: 16px 0;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #8B6914, #DAA520, #B8860B);
      color: #FFF;
      box-shadow: 0 4px 18px rgba(218, 165, 32, .22);
      transition: all .2s ease
    }

    .start-btn:hover {
      box-shadow: 0 6px 24px rgba(218, 165, 32, .35);
      transform: translateY(-1px)
    }

    .start-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(218, 165, 32, .18)
    }

    .scene-btn {
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      transition: all .2s ease
    }

    .scene-btn:active {
      transform: scale(0.94)
    }

    .deity-img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #DAA520;
      box-shadow: 0 0 12px rgba(218, 165, 32, .3)
    }

    .deity-img-lg {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #FFD700;
      box-shadow: 0 0 20px rgba(218, 165, 32, .4)
    }

    /* Bowing animation */
    @keyframes bowDown {
      0% {
        transform: rotate(0deg)
      }

      100% {
        transform: rotate(-35deg)
      }
    }

    @keyframes bowUp {
      0% {
        transform: rotate(-35deg)
      }

      100% {
        transform: rotate(0deg)
      }
    }

    .person-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 4px
    }

    .person-body {
      transform-origin: bottom center;
      animation: bowCycle 3s ease-in-out forwards
    }

    @keyframes bowCycle {
      0% {
        transform: rotate(0)
      }

      8% {
        transform: rotate(-35deg)
      }

      16% {
        transform: rotate(0)
      }

      25% {
        transform: rotate(0)
      }

      33% {
        transform: rotate(-35deg)
      }

      41% {
        transform: rotate(0)
      }

      50% {
        transform: rotate(0)
      }

      58% {
        transform: rotate(-35deg)
      }

      66% {
        transform: rotate(0)
      }

      100% {
        transform: rotate(0)
      }
    }

    /* Jiaobei animation */
    @keyframes jiaobeiFall1 {
      0% {
        transform: translateY(0) rotateX(0)
      }

      40% {
        transform: translateY(40px) rotateX(720deg)
      }

      60% {
        transform: translateY(25px) rotateX(800deg)
      }

      80% {
        transform: translateY(38px) rotateX(850deg)
      }

      100% {
        transform: translateY(40px) rotateX(var(--final-rot1))
      }
    }

    @keyframes jiaobeiFall2 {
      0% {
        transform: translateY(0) rotateX(0)
      }

      45% {
        transform: translateY(40px) rotateX(540deg)
      }

      65% {
        transform: translateY(22px) rotateX(650deg)
      }

      85% {
        transform: translateY(38px) rotateX(700deg)
      }

      100% {
        transform: translateY(40px) rotateX(var(--final-rot2))
      }
    }

    .jiaobei-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .jiaobei-box {
      background: linear-gradient(135deg, #1A1A2E, #16213E);
      border: 1px solid rgba(218, 165, 32, .3);
      border-radius: 16px;
      padding: 18px 20px;
      text-align: center;
      max-width: 420px;
      width: 92%;
      max-height: 90vh;
      overflow-y: auto
    }

    /* Ad banner */
    .ad-banner {
      width: 100%;
      max-width: 480px;
      margin: 14px auto 8px;
      background: linear-gradient(135deg, rgba(255,255,255,.04), rgba(218,165,32,.06));
      border: 1px solid rgba(218,165,32,.15);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      text-decoration: none;
      color: #E8DCC8;
      transition: all .25s ease;
      position: relative;
      overflow: hidden
    }

    .ad-banner:hover {
      background: rgba(218,165,32,.1);
      border-color: rgba(218,165,32,.3);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(218,165,32,.15)
    }

    .ad-banner .ad-icon {
      font-size: 28px;
      flex-shrink: 0
    }

    .ad-banner .ad-body {
      flex: 1;
      min-width: 0
    }

    .ad-banner .ad-title {
      font-size: 14px;
      font-weight: 700;
      color: #FFD700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .ad-banner .ad-desc {
      font-size: 11px;
      color: #8B7D6B;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .ad-banner .ad-tag {
      font-size: 9px;
      color: #666;
      background: rgba(255,255,255,.06);
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0
    }

    .ad-banner .ad-go {
      font-size: 14px;
      color: #DAA520;
      flex-shrink: 0
    }

    .jiaobei-piece {
      display: inline-block;
      width: 50px;
      height: 80px;
      margin: 0 12px;
      perspective: 200px
    }

    .jiaobei-inner {
      width: 100%;
      height: 100%;
      position: relative
    }

    .jiaobei-flat,
    .jiaobei-round {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 0 0 50% 50%/0 0 80% 80%;
      backface-visibility: hidden
    }

    .jiaobei-flat {
      background: linear-gradient(135deg, #C0392B, #96281B)
    }

    .jiaobei-round {
      background: linear-gradient(135deg, #DAA520, #B8860B);
      transform: rotateX(180deg)
    }

    @keyframes ember {

      0%,
      100% {
        box-shadow: 0 0 6px 3px rgba(255, 100, 0, .5)
      }

      50% {
        box-shadow: 0 0 14px 7px rgba(255, 80, 0, .8)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes glow {

      0%,
      100% {
        text-shadow: 0 0 8px rgba(255, 215, 0, .1)
      }

      50% {
        text-shadow: 0 0 24px rgba(255, 215, 0, .5)
      }
    }

    @keyframes lighterIn {
      0% {
        opacity: 0;
        transform: translate(55px, 15px) rotate(18deg)
      }

      55% {
        opacity: 1;
        transform: translate(0, -3px) rotate(-7deg)
      }

      100% {
        transform: translate(0, 0) rotate(-5deg)
      }
    }

    @keyframes lighterFlame {

      0%,
      100% {
        height: 18px;
        opacity: .8
      }

      50% {
        height: 24px;
        opacity: 1
      }
    }

    @keyframes lighterOut {
      0% {
        opacity: 1;
        transform: rotate(-5deg)
      }

      100% {
        opacity: 0;
        transform: translate(60px, 25px) rotate(22deg)
      }
    }

    @keyframes insertStick {
      0% {
        transform: translateY(-60px);
        opacity: 0
      }

      55% {
        transform: translateY(3px);
        opacity: 1
      }

      75% {
        transform: translateY(-2px)
      }

      100% {
        transform: translateY(0)
      }
    }

    @keyframes btnPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(218, 165, 32, .3)
      }

      70% {
        box-shadow: 0 0 0 10px rgba(218, 165, 32, 0)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(218, 165, 32, 0)
      }
    }

    @keyframes clickRipple {
      0% {
        transform: scale(0);
        opacity: 1
      }

      100% {
        transform: scale(1);
        opacity: 0
      }
    }

    #setup-page {
      animation: fadeIn .4s ease-out
    }

    #scene-page.scene-enter {
      animation: fadeIn .4s ease-out
    }

    @media(max-width:480px) {
      .container {
        width: 96%;
        padding: 0 6px
      }

      .grid3 {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px
      }

      .grid4 {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px
      }

      .tab-btn {
        padding: 10px 12px;
        font-size: 14px
      }

      .sel-btn {
        padding: 12px 8px
      }

      .sel-btn .label {
        font-size: 13px
      }

      .start-btn {
        font-size: 18px;
        padding: 16px 0
      }
    }

    @media(min-width:481px) and (max-width:768px) {
      .container {
        max-width: 700px
      }

      .grid3 {
        gap: 12px
      }

      .grid4 {
        grid-template-columns: repeat(4, 1fr);
        gap: 10px
      }
    }

    @media(min-width:769px) {
      .container {
        max-width: 960px
      }

      .grid3 {
        gap: 16px
      }

      .grid4 {
        gap: 14px;
        grid-template-columns: repeat(4, 1fr)
      }

      .sel-btn {
        padding: 18px 14px
      }

      .sel-btn .label {
        font-size: 16px
      }

      .tab-btn {
        padding: 14px 28px;
        font-size: 17px
      }

      .start-btn {
        font-size: 22px;
        padding: 20px 0
      }

      .scene-btn {
        padding: 14px 32px;
        font-size: 16px
      }
    }
  </style>
</head>

      }
      if (S.phase === 'lighting') page.innerHTML += '<div style="text-align:center;margin-top:10px;font-size:16px;color:#FFD700">🔥 對準香頭點火中...</div>';
      if (S.phase === 'inserting') page.innerHTML += '<div style="text-align:center;margin-top:10px;font-size:16px;color:#BBA86A">📌 將香插入香爐...</div>';
      if (S.phase === 'done') page.innerHTML += '<div style="text-align:center;margin-top:12px"><div style="font-size:36px">🙏</div><div style="font-size:22px;font-weight:700;color:#FFD700;animation:glow 2s infinite">香已燒完，功德圓滿</div><div style="font-size:14px;color:#8B7D6B">' + (S.deity.id !== 'none' ? S.deity.name + ' 保佑平安' : '心誠則靈') + '</div></div>';

      page.innerHTML += '<div style="margin-top:10px;padding:8px 14px;border-radius:7px;background:rgba(255,255,255,.03);font-size:12px;color:#777;text-align:center">' + S.brand.name + ' ・ ' + S.thick.name + ' ・ ' + S.len.name + ' ・ ' + S.count + '支 ・ 👥' + S.people + '人' + (S.offerings.length > 0 ? ' ・ 供品' + S.offerings.length + '項' : '') + (S.cups > 0 ? ' ・ ' + S.wine.name + S.cups + '杯' : '') + '</div>';

      if (S.phase === 'burning') {
        var jiaoBtn = h('button', { class: 'scene-btn', style: { border: '1px solid rgba(218,165,32,.35)', background: 'linear-gradient(135deg,rgba(218,165,32,.15),rgba(218,165,32,.08))', color: '#FFD700' }, onClick: showJiaobei }, '🥮 擲筊');
        addClickEffect(jiaoBtn);

    // Person SVG for bowing animation
    function personHTML(idx) {
      var delay = (idx * 0.15) + 's';

        '<rect x="14" y="46" width="5" height="20" rx="2" fill="#1A1A2E"/>' +

    // ═══════════ ANIMATIONS ═══════════
    function startBurn() {
      S.elapsed = 0; S.wineFilled = false;
      S.phase = 'lighting'; S.lighter = 'in';
      render();
      // Use targeted DOM updates for lighter animation to avoid full re-renders
      setTimeout(function () {
        S.lighter = 'lit';
        // Just update lighter element, no full re-render needed
        var lighterEl = document.getElementById('lighter');
        if (lighterEl) {
          lighterEl.style.animation = 'none';
        }
      }, 900);
      setTimeout(function () {
        S.lighter = 'out';
        var lighterEl = document.getElementById('lighter');
        if (lighterEl) {
          lighterEl.style.animation = 'lighterOut .6s ease-in forwards';
        }
      }, 2800);
      setTimeout(function () { S.lighter = null; S.phase = 'bowing'; render() }, 3400);
      // After bowing animation (3s), insert sticks
      setTimeout(function () { S.phase = 'inserting'; render() }, 6400);
      setTimeout(function () {
        if (S.cups > 0) { S.phase = 'pouring'; render(); }
        else { S.phase = 'burning'; render(); startTimer(); }
      }, 7300);
    }

    function animatePour(idx) {
      if (idx >= S.cups) { S.wineFilled = true; S.phase = 'burning'; render(); startTimer(); return; }
      var fills = document.querySelectorAll('.cup-fill');
      if (fills[idx]) {
        fills[idx].setAttribute('y', '6');
        fills[idx].setAttribute('height', '10');
        fills[idx].style.transition = 'all .4s ease-out';
      }
      setTimeout(function () { animatePour(idx + 1) }, 400);
    }

    function updateBurnUI() {
      var rem = Math.max(0, totalTime() - S.elapsed);
      var mm = String(Math.floor(rem / 60)).padStart(2, '0');
      var ss = String(Math.floor(rem % 60)).padStart(2, '0');
      var timerEl = document.getElementById('timer-display');
      if (timerEl) timerEl.textContent = mm + ':' + ss;
      var progEl = document.getElementById('burn-progress');
      if (progEl) progEl.style.width = Math.round(burnPct() * 100) + '%';
      var stickContainers = document.querySelectorAll('[data-stick]');
      var bp = burnPct();
      stickContainers.forEach(function (stick) {
        var ht = S.len.h;
        var burnedH = ht * bp;
        var remainH = ht - burnedH;
        var ashEl = stick.querySelector('[data-ash]');
        var stickEl = stick.querySelector('[data-remain]');
        if (ashEl) ashEl.style.height = burnedH + 'px';
        if (stickEl) stickEl.style.height = Math.max(remainH, 0) + 'px';
      });
    }

    function startTimer() {
      if (timerIv) clearInterval(timerIv);
      timerIv = setInterval(function () {
        S.elapsed++;
        if (S.elapsed >= totalTime()) {
          clearInterval(timerIv); timerIv = null;
          stopSmoke();
          S.phase = 'done'; render();
          return;
        }
        updateBurnUI();
      }, 1000);
    }

    function startSmoke() {
      if (smokeRaf) return;
      var canvas = document.getElementById('smoke-canvas');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var W = canvas.width, H = canvas.height;
      var spread = Math.min(260, S.count * 24 + 32);
      var censerW = Math.max(170, spread + 50);
      var censerH = Math.round(censerW * .45);
      var stickH = S.len.h + 22;
      var plantDepth = 32;
      smokePs = [];
      function getTips() {
        var bp = burnPct();
        var gap = spread / (S.count + 1);
        var x0 = W / 2 - spread / 2;
        var stickBottom = H - censerH + plantDepth;
        var stickTop = stickBottom - stickH;
        var tips = [];
        for (var i = 0; i < S.count; i++) tips.push({ x: x0 + gap * (i + 1), y: Math.max(5, stickTop + S.len.h * bp) });
        return tips;
      }
      var last = 0;
      var rgb = S.brand.smoke;
      function loop(ts) {
        ctx.clearRect(0, 0, W, H);
        var tips = getTips();
        if (ts - last > 70) {
          tips.forEach(function (t) {
            smokePs.push({ x: t.x + (Math.random() - .5) * 3, y: t.y, vx: (Math.random() - .5) * .25, vy: -(0.15 + Math.random() * .3), r: 1.5 + Math.random() * 4, life: 1, d: .003 + Math.random() * .003, ws: .01 + Math.random() * .012, wa: .15 + Math.random() * .4, t: Math.random() * 6.28 });
          });
          last = ts;
        }
        for (var i = 0; i < smokePs.length; i++) {
          var p = smokePs[i];
          p.t += p.ws; p.x += p.vx + Math.sin(p.t) * p.wa; p.y += p.vy; p.r += .03; p.life -= p.d;
        }
        smokePs = smokePs.filter(function (p) { return p.life > 0 });
        if (smokePs.length > 200) smokePs.splice(0, smokePs.length - 150);
        for (var i = 0; i < smokePs.length; i++) {
          var p = smokePs[i];
          var a = p.life * .25;
          var g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
          g.addColorStop(0, 'rgba(' + rgb + ',' + a + ')');
          g.addColorStop(1, 'rgba(' + rgb + ',0)');
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.28); ctx.fillStyle = g; ctx.fill();
        }
        smokeRaf = requestAnimationFrame(loop);
      }
      smokeRaf = requestAnimationFrame(loop);
    }
    function stopSmoke() { if (smokeRaf) { cancelAnimationFrame(smokeRaf); smokeRaf = null; } }

    // ═══════════ JIAOBEI (筊杯) ═══════════
    function showJiaobei() {
      var overlay = h('div', { class: 'jiaobei-modal', id: 'jiaobei-overlay' });
      var box = h('div', { class: 'jiaobei-box' });
      box.innerHTML = '<div style="font-size:36px;margin-bottom:8px">🥮</div><div style="font-size:20px;font-weight:700;color:#FFD700;margin-bottom:12px">擲筊問事</div><div style="font-size:14px;color:#BBA86A;margin-bottom:12px">先輸入您的祈願，再擲筊問神明</div>';
      var textarea = h('textarea', { id: 'jiao-text', style: { width: '100%', height: '80px', background: 'rgba(255,255,255,.06)', border: '1px solid rgba(218,165,32,.25)', borderRadius: '8px', color: '#E8DCC8', padding: '10px', fontSize: '15px', fontFamily: 'Noto Serif TC,serif', resize: 'none', outline: 'none' }, placeholder: '在此輸入您的祈願...' });
      box.appendChild(textarea);
      var btnRow = h('div', { style: { display: 'flex', gap: '10px', justifyContent: 'center', marginTop: '14px' } });
      var throwBtn = h('button', {
        class: 'scene-btn', style: { border: '1px solid #DAA520', background: 'linear-gradient(135deg,#8B6914,#B8860B)', color: '#FFF', padding: '12px 28px', fontSize: '16px' }, onClick: function () {
          var text = document.getElementById('jiao-text').value.trim();
          if (!text) { textarea.style.borderColor = '#E74C3C'; return; }
          doThrowJiaobei(text);
        }
      }, '🥮 擲筊');
      addClickEffect(throwBtn);
      btnRow.appendChild(throwBtn);
      var closeBtn = h('button', { class: 'scene-btn', style: { border: '1px solid #555', background: 'rgba(255,255,255,.05)', color: '#ccc' }, onClick: function () { document.getElementById('jiaobei-overlay').remove(); } }, '❌ 關閉');
      btnRow.appendChild(closeBtn);
      box.appendChild(btnRow);
      overlay.appendChild(box);
      document.body.appendChild(overlay);
    }

    function doThrowJiaobei(text) {
      var rand = Math.random();
      var result, emoji, color, desc;
      if (rand < 0.45) { result = '聖杯'; emoji = '🎉'; color = '#FFD700'; desc = '一正一反 — 神明同意！'; }
      else if (rand < 0.72) { result = '笑杯'; emoji = '😄'; color = '#FF9800'; desc = '兩面朝上 — 神明笑而不答'; }
      else { result = '陰杯'; emoji = '😔'; color = '#9E9E9E'; desc = '兩面朝下 — 神明不同意'; }

      var overlay = document.getElementById('jiaobei-overlay');
      if (!overlay) return;
      var box = overlay.querySelector('.jiaobei-box');
      box.innerHTML = '<div style="font-size:14px;color:#BBA86A;margin-bottom:4px">🙏 祈願：</div><div style="font-size:13px;color:#E8DCC8;margin-bottom:10px;padding:6px 8px;background:rgba(255,255,255,.04);border-radius:6px;border:1px solid rgba(218,165,32,.1)">' + text + '</div>';

      // Jiaobei area - using real photographic images
      var animArea = h('div', { style: { display: 'flex', justifyContent: 'center', alignItems: 'center', gap: '12px', padding: '4px 0', flexWrap: 'wrap' } });

      // Determine final orientation based on result
      // 聖杯: one flat + one round, 笑杯: both flat (both yang up), 陰杯: both round (both yin up)
      var isFlat1 = (result === '聖杯') ? true : (result === '笑杯') ? true : false;
      var isFlat2 = (result === '聖杯') ? false : (result === '笑杯') ? true : false;

      // Use real photo images for jiaobei
      var img1 = isFlat1 ? 'images/jiaobei_flat.png' : 'images/jiaobei_round.png';
      var img2 = isFlat2 ? 'images/jiaobei_flat.png' : 'images/jiaobei_round.png';
      var lbl1 = isFlat1 ? '陽面（平）' : '陰面（凸）';
      var lbl2 = isFlat2 ? '陽面（平）' : '陰面（凸）';

      var piece1 = '<div style="display:inline-flex;flex-direction:column;align-items:center;animation:jiaobeiFall1 1s cubic-bezier(.25,.46,.45,.94) forwards;--final-rot1:0deg">' +
        '<img src="' + img1 + '" style="width:90px;height:90px;object-fit:contain;transform:rotate(-8deg);filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))">' +
        '<div style="font-size:11px;color:#BBA86A;margin-top:2px">' + lbl1 + '</div></div>';
      var piece2 = '<div style="display:inline-flex;flex-direction:column;align-items:center;animation:jiaobeiFall2 1s cubic-bezier(.25,.46,.45,.94) forwards;--final-rot2:0deg">' +
        '<img src="' + img2 + '" style="width:90px;height:90px;object-fit:contain;transform:rotate(8deg);filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))">' +
        '<div style="font-size:11px;color:#BBA86A;margin-top:2px">' + lbl2 + '</div></div>';
      animArea.innerHTML = piece1 + piece2;
      box.appendChild(animArea);

      // Show result after animation
      setTimeout(function () {
        var resultDiv = h('div', { style: { textAlign: 'center', animation: 'fadeIn .4s ease', marginTop: '4px' } });
        resultDiv.innerHTML = '<div style="font-size:26px">' + emoji + '</div><div style="font-size:22px;font-weight:900;color:' + color + ';margin:2px 0">' + result + '</div><div style="font-size:13px;color:#BBA86A">' + desc + '</div>';
        box.appendChild(resultDiv);

        var btnRow2 = h('div', { style: { display: 'flex', gap: '10px', justifyContent: 'center', marginTop: '14px' } });
        var againBtn = h('button', { class: 'scene-btn', style: { border: '1px solid #DAA520', background: 'linear-gradient(135deg,#8B6914,#B8860B)', color: '#FFF' }, onClick: function () { document.getElementById('jiaobei-overlay').remove(); showJiaobei(); } }, '🔄 再擲一次');
        addClickEffect(againBtn);
        btnRow2.appendChild(againBtn);
        var doneBtn = h('button', { class: 'scene-btn', style: { border: '1px solid #555', background: 'rgba(255,255,255,.05)', color: '#ccc' }, onClick: function () { document.getElementById('jiaobei-overlay').remove(); } }, '✅ 完成');
        btnRow2.appendChild(doneBtn);
        box.appendChild(btnRow2);
      }, 1400);
    }

    function showLeaveDialog() {
      var overlay = h('div', { id: 'leave-overlay', style: { position: 'fixed', inset: '0', background: 'rgba(0,0,0,.7)', zIndex: '1000', display: 'flex', alignItems: 'center', justifyContent: 'center' } });
      var box = h('div', { style: { background: 'linear-gradient(135deg,#1A1A2E,#16213E)', border: '1px solid rgba(218,165,32,.25)', borderRadius: '14px', padding: '28px 32px', textAlign: 'center', maxWidth: '360px', width: '90%' } });
      box.innerHTML = '<div style="font-size:36px">🙏</div><div style="font-size:18px;font-weight:700;color:#FFD700;margin-top:4px">香尚未燒完</div><div style="font-size:15px;color:#ccc;margin-bottom:18px;line-height:1.5">繼續燃燒或結束？</div>';
      var btns = h('div', { style: { display: 'flex', gap: '10px', justifyContent: 'center' } });
      btns.appendChild(h('button', { class: 'scene-btn', style: { border: '1px solid #DAA520', background: 'linear-gradient(135deg,#8B6914,#B8860B)', color: '#FFF' }, onClick: function () { document.getElementById('leave-overlay').remove(); } }, '🔥 繼續'));
      btns.appendChild(h('button', { class: 'scene-btn', style: { border: '1px solid #555', background: 'rgba(255,255,255,.05)', color: '#ccc' }, onClick: function () { document.getElementById('leave-overlay').remove(); resetAll(); } }, '🕯️ 結束'));
      box.appendChild(btns);
      overlay.appendChild(box);
      document.body.appendChild(overlay);
    }

    function resetAll() {
      if (timerIv) { clearInterval(timerIv); timerIv = null; }
      stopSmoke();
      S.phase = 'setup'; S.prevPhase = 'setup'; S.elapsed = 0; S.lighter = null; S.wineFilled = false; S.jiaoResult = null;
      render();
    }

    // ═══════════ INIT ═══════════
    render();
  </script>
</body>

</html>
